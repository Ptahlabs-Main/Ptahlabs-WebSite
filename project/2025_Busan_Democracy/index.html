lse,"tags":["exhibition","interactive","history","kiosk","media-art","information","touchscreen","display"],"images":[],"thumbnail":"","description":"부산 민주공원 민주주의기록관 인터랙티브 전시 콘텐츠","descriptionTitle":"민주주의기록관 사료관","detailedDescription":["부산 민주공원의 부속건물인 민주주의기록관 사료관에 납품한 인터랙티브 전시 콘텐츠입니다.","부마민주항쟁, 5.18 광주 민주화운동, 6월 민주항쟁 등 대한민국 민주화 역사를 다양한 디지털 콘텐츠로 체험할 수 있도록 구성하였습니다.","정보 검색 키오스크, 미디어아트, 라이브 스케치 등 다양한 형태의 인터랙티브 전시물을 통해 관람객들이 민주화 운동의 역사를 생생하게 경험할 수 있습니다."],"year":"2025","location":"부산","country":"KR","lastmod":"2025-12-02","sections":[{"type":"text","content":"부산 민주공원의 부속건물인 민주주의기록관 사료관에 납품한 인터랙티브 전시 콘텐츠입니다. 부마민주항쟁, 5.18 광주 민주화운동, 6월 민주항쟁 등 대한민국 민주화 역사를 다양한 디지털 콘텐츠로 체험할 수 있도록 구성하였습니다."},{"type":"exhibits","title":"전시물","items":[{"title":"디지털 멀티비전","description":"로비 환영공간에 설치된 대형 멀티비전입니다.\n\n부산민주공원 종합안내, 사료관 기증자 명단, 전시·행사 안내 등 다양한 정보를 멀티비전으로 연출합니다. 기증자 명단과 포스터를 효과적으로 전달하는 디지털 사이니지 역할을 수행합니다.","tags":["display","information"],"images":[]},{"title":"유월길 열기를 따라","description":"6월 민주항쟁의 전개 과정을 타임라인으로 체험하는 정보형 키오스크입니다.\n\n부산 지도를 중심으로 민주항쟁 운동 일자별 경로와 거점을 표기하였습니다. 날짜 슬라이더를 통해 카드 형태로 시위의 경로, 양상, 참여인원을 확인할 수 있으며, 그날의 기록을 아나운서 목소리로 들을 수 있습니다. 대학 신문사 기자들의 사건일지를 바탕으로 Unity로 제작되었습니다.","tags":["kiosk","interactive","timeline","history"],"images":[]},{"title":"6월 우리들의 이야기","description":"6월 항쟁 수기 및 구술영상을 검색하고 재생하는 정보 키오스크입니다.\n\n'애국', '민주', '전경으로부터', '어느 여고생의 외침' 등 다양한 관점에서 6월 항쟁을 바라보는 이야기를 소개합니다. 수기는 사진과 함께 낭독으로 제공되며, 6월 항쟁 이후 전대협 등록금 투쟁, 전노협 등 우리 사회의 변화도 함께 다룹니다.","tags":["kiosk","information","interactive","history"],"images":[]},{"title":"구술 아카이빙","description":"민주화 운동을 겪은 시민들의 구술 인터뷰를 체험하는 키오스크입니다.\n\n부마민주항쟁, 5.18 광주 민주화운동, 6월 민주항쟁 등 다양한 민주화 사건의 증언을 찾아볼 수 있습니다. 스피커를 구식 전화기 수화기 형태로 연출하여 실감나는 체험을 제공합니다.","tags":["kiosk","interactive","experience","history"],"images":[]},{"title":"디지털 아카이빙 \u0026 보이는 수장고","description":"민주공원 소장 사료를 검색하는 터치스크린형 키오스크입니다.\n\n문헌, 간행물, 신문 등의 사료를 제목 또는 연도, 작가, 키워드로 검색할 수 있습니다. 엑셀 기반으로 관리되어 담당자가 내용을 수정하면 별도 업데이트 없이 바로 반영됩니다. 전시된 작품과 수장고에 보관된 작품 모두 검색 가능하며, 가로형과 세로형 2대로 운영됩니다.","tags":["kiosk","information","touchscreen"],"images":[],"relatedSolution":{"id":"Solution_InfoKiosk","title":"정보 키오스크 솔루션"}},{"title":"항쟁의 목소리","description":"민주화 확산을 시각화한 3면 미디어아트입니다.\n\n민주화가 확산되는 모습을 동백꽃이 퍼져나가는 영상으로 연출하였습니다. 부산을 상징하는 동백꽃의 붉은 색상이 민주화 운동의 열정을 표현합니다.","tags":["media-art","display"],"images":[]},{"title":"라이브 스케치 - 바다 물고기","description":"어린이를 위한 체험형 라이브 스케치 콘텐츠입니다.\n\n종이에 물고기를 채색한 후 스캐너로 스캔하면 바다 화면에 물고기가 떠다닙니다. 바다 주변 지역 특성을 반영하였으며, 기록관 테마에 맞게 민주화 운동 관련 기록물 요소도 포함되어 있습니다. Unreal Engine으로 제작되었습니다.","tags":["interactive","experience","game","education"],"images":[]},{"title":"민중미술 그리기","description":"관람객이 민중미술 작가가 되어보는 색칠 체험 콘텐츠입니다.\n\n민주화 운동 및 민주주의 관련 그림을 흑백으로 제공하여 어린이들이 직접 채색할 수 있습니다. 태극기 채색 등 다양한 콘텐츠가 2대의 키오스크에서 나란히 운영됩니다.","tags":["interactive","experience","education","touchscreen"],"images":[]}]}]}},"__N_SSG":true},"page":"/project/[projectId]","query":{"projectId":"2025_Busan_Democracy"},"buildId":"vgVFM2eL01ELpVAKGA9NV","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
