","kiosk","media-art"],"images":[],"thumbnail":"","description":"생성형 AI와 음성·영상 인식 기술을 전시 콘텐츠에 접목한 AI 솔루션 모음","year":"2026","lastmod":"2026-07-06","isSolution":true,"sections":[{"type":"text","content":"전시관, 박물관, 체험관을 위한 AI 활용 솔루션 모음입니다.\n생성형 AI, 음성 인식, 이미지 인식 기술을 전시 콘텐츠에 접목하여 관람객 개개인에게 맞춤형 경험을 제공합니다. 기존 키오스크·미디어아트 솔루션과 결합하여 도입할 수 있습니다."},{"type":"exhibits","title":"AI 솔루션 라인업","items":[{"title":"AI 도슨트 챗봇","description":"관람객의 질문에 자연어로 답변하는 대화형 전시 안내 솔루션입니다.\n\n전시 자료를 학습한 AI가 전시물 해설, 관람 동선 안내, 부대시설 정보를 실시간으로 제공합니다. 키오스크, 모바일 웹 등 다양한 형태로 도입할 수 있습니다.","tags":["ai","docent","interactive"],"images":[]},{"title":"AI 사료 검색","description":"방대한 소장 자료를 자연어로 검색하는 AI 검색 솔루션입니다.\n\n키워드가 정확하지 않아도 질문의 의미를 이해하여 관련 사료를 찾아줍니다. 기존 정보 키오스크 솔루션의 엑셀 기반 데이터 관리 방식과 결합하여 운영 부담 없이 도입할 수 있습니다.","tags":["ai","information","kiosk","touchscreen"],"images":[],"relatedSolution":{"id":"Solution_InfoKiosk","title":"정보 키오스크 솔루션"}},{"title":"AI 포토부스","description":"촬영한 사진을 AI가 전시 테마에 맞는 화풍으로 변환해주는 체험형 포토 솔루션입니다.\n\n민화, 수묵화, 캐릭터 일러스트 등 전시 콘셉트에 맞춘 스타일로 변환하여 인쇄물 또는 모바일 전송으로 제공합니다. 기존 포토부스 솔루션에 AI 변환 기능을 더한 구성입니다.","tags":["ai","photo","experience","printer"],"images":[],"relatedSolution":{"id":"Solution_PhotoBooth","title":"포토부스 솔루션"}},{"title":"생성형 미디어아트","description":"관람객의 참여로 실시간 생성되는 인터랙티브 미디어아트 솔루션입니다.\n\n관람객이 입력한 키워드, 그림, 음성이 AI를 통해 대형 스크린의 영상 콘텐츠로 재탄생합니다. 관람객 한 명 한 명이 작품의 일부가 되는 참여형 전시 연출이 가능합니다.","tags":["ai","media-art","interactive","experience"],"images":[]},{"title":"AI 음성 안내","description":"음성 인식과 음성 합성을 활용한 핸즈프리 전시 안내 솔루션입니다.\n\n터치 없이 음성만으로 정보를 검색할 수 있어 접근성이 뛰어나며, 전시 콘셉트에 맞는 목소리로 안내 음성을 제작할 수 있습니다. 어린이·고령자·장애인 관람객의 이용 편의성을 높입니다.","tags":["ai","accessibility","interactive"],"images":[]}]}]}},"__N_SSG":true},"page":"/project/[projectId]","query":{"projectId":"Solution_AI"},"buildId":"nvxwRomsa4E_g6NlvM4kI","isFallback":false,"gsp":true,"scriptLoader":[]}</script></body></html>
